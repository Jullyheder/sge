{% extends 'base.html' %}

{% block title %}Deletar Produto{% endblock %}

{% block content %}
  <div class="container mt-4">
    <h3 class="display-6">Deletar Produto</h3>
    <div class="card">
      <div class="card-body">
        <p class="card-text">Tem certeza que deseja deletar a produto <strong>{{ product.title }}</strong>?</p>

        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Deletar Produto</button>
        </form>
      </div>
    </div>
    <a href="{% url 'product_list' %}" class="btn btn-secondary mt-3">Cancelar e Voltar para Lista de Produtos</a>
  </div>
{% endblock %}
