services:
  sge_web:
    build: .
    container_name: sge_web
    restart: always
    environment:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - sge_db
    networks:
      - sge_network

  sge_db:
    image: postgres
    container_name: sge_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sge
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
    networks:
      - sge_network

volumes:
  postgres_data:

networks:
  sge_network:
    driver: bridge
